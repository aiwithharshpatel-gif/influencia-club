services:
  database:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: influenzia
      MYSQL_ROOT_PASSWORD: Influenzia@2026
    ports:
      - "3306:3306"
    volumes:
      - db_data_v2:/var/lib/mysql

  api_service:
    build: 
      context: ./backend
      args:
        - CACHEBUST=20260427-1055
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=mysql://root:Influenzia@2026@database:3306/influenzia
      - NODE_ENV=production
      - JWT_SECRET=d51a97a37d7d619d6e544f023f4742873cadc2c7256de8b4ad807407b6538cfe
      - JWT_REFRESH_SECRET=73916bb17631920434fcf3387ea52df325042ea9df3fa107f2c207d0ff2347fb
      - PORT=5000
      - FRONTEND_URL=http://localhost
    depends_on:
      - database

  web_ui:
    build: 
      context: ./frontend
      args:
        - VITE_API_URL=/api
        - CACHEBUST=20260427-1055
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api_service

volumes:
  db_data_v2:
