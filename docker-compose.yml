services:
  database:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-influenzia}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
    ports:
      - "3306:3306"
    volumes:
      - db_data_v3:/var/lib/mysql
    networks:
      - app-network

  backend_final: # RENAMED SERVICE
    build: 
      context: ./backend
      args:
        - CACHEBUST=LAUNCH-FINAL-VER-102
    restart: always
    expose:
      - "5000"
    environment:
      - DATABASE_URL=${DATABASE_URL:?Set DATABASE_URL in .env}
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET in .env}
      - JWT_ADMIN_SECRET=${JWT_ADMIN_SECRET:-}
      - PORT=${PORT:-5000}
      - FRONTEND_URL=${FRONTEND_URL:?Set FRONTEND_URL in .env}
      - REFERRAL_BASE_URL=${REFERRAL_BASE_URL:-}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - EMAIL_FROM=${EMAIL_FROM:-hello@influenziaclub.com}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID:-}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET:-}
      - CASHFREE_APP_ID=${CASHFREE_APP_ID:-}
      - CASHFREE_SECRET_KEY=${CASHFREE_SECRET_KEY:-}
    depends_on:
      - database
    networks:
      - app-network

  frontend_final: # RENAMED SERVICE
    build: 
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
        - CACHEBUST=LAUNCH-FINAL-VER-102
    restart: always
    ports:
      - "5000:80"
    depends_on:
      - backend_final
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data_v3:
